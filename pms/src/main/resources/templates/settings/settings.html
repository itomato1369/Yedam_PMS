<!DOCTYPE html>
<html lang="ko" xmlns:th="https://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{common/layouts/default-layout}">

<head>
<style>
/* 1. 로컬 테마 변수 (본문 전용) */
:root {
	--pms-card-bg: #ffffff;
	--pms-text: #212529;
	--pms-border: #dee2e6;
	--pms-accent: #321fdb;
	--thead-bg: #f8f9fa;
}

[data-coreui-theme="dark"] {
	--pms-card-bg: #2a303d;
	--pms-text: #e0e2e6;
	--pms-border: #3c434f;
	--pms-accent: #82b1ff; /* 소프트 블루 */
	--thead-bg: #212631; /* 차분한 헤더 배경 */
}

/* 📍 2. 범위 제한: 사이드바 보호를 위해 #settingsAccordion 내부만 적용 */

/* 아코디언 아이템 간격 설정 (1px) */
#settingsAccordion .accordion-item {
	background-color: var(--pms-card-bg) !important;
	border: 1px solid var(--pms-border) !important;
	margin-bottom: 1px !important; /* 📏 센세가 요청하신 1px 간격 */
	border-radius: 4px !important;
	overflow: hidden;
}

#settingsAccordion .accordion-item:last-child {
	margin-bottom: 0 !important;
}

/* 아코디언 버튼 스타일 */
#settingsAccordion .accordion-button {
	background-color: var(--pms-card-bg) !important;
	color: var(--pms-text) !important;
	font-weight: 600;
}

#settingsAccordion .accordion-button:not(.collapsed) {
	color: var(--pms-accent) !important;
	background-color: rgba(130, 177, 255, 0.05) !important;
	box-shadow: inset 0 -1px 0 var(--pms-border) !important;
}

#settingsAccordion .accordion-button:focus {
	box-shadow: none !important;
}

#settingsAccordion .card {
	background-color: var(--pms-card-bg) !important;
	border: 1px solid var(--pms-border) !important;
	color: var(--pms-text) !important;
}

/* 📍 3. 테이블 및 헤더 가독성 강화 */
#settingsAccordion .table {
	color: var(--pms-text) !important;
}

#settingsAccordion .table thead, #settingsAccordion .table thead th {
	background-color: var(--thead-bg) !important;
	color: var(--pms-text) !important;
	font-weight: 600;
	border-bottom: 2px solid var(--pms-border) !important;
	padding: 12px 8px !important;
}

/* 📍 4. 본문 내 링크 및 강조색 (사이드바 a태그 보호) */
#settingsAccordion a, #settingsAccordion .text-primary,
	#settingsAccordion .name-text {
	color: var(--pms-accent) !important;
	transition: 0.2s;
	text-decoration: none;
}

#settingsAccordion a:hover, #settingsAccordion .name-text:hover {
	filter: brightness(1.2);
	text-decoration: underline !important;
}

/* 5. 입력 필드 스타일 */
#settingsAccordion .form-control, #settingsAccordion .form-select {
	background-color: var(--pms-card-bg) !important;
	border-color: var(--pms-border) !important;
	color: var(--pms-text) !important;
}

/* 6. 테이블 줄무늬 및 호버 (아코디언 전용) */
#settingsAccordion .table-striped>tbody>tr:nth-of-type(odd)>* {
	--cui-table-accent-bg: rgba(255, 255, 255, 0.02) !important;
}

#settingsAccordion .table-hover>tbody>tr:hover>* {
	--cui-table-accent-bg: rgba(255, 255, 255, 0.04) !important;
}

/* 7. 배지 스타일 보완 */
#settingsAccordion .text-bg-light {
	background-color: rgba(255, 255, 255, 0.1) !important;
	color: var(--pms-text) !important;
	border: 1px solid var(--pms-border) !important;
}
</style>
</head>
<body>
	<div layout:fragment="Content">
		<div class="accordion" id="settingsAccordion">
			<!-- 프로젝트 아코디언 -->
			<div class="accordion-item">
				<h2 class="accordion-header">
					<button class="accordion-button" type="button"
						data-coreui-toggle="collapse"
						data-coreui-target="#collapseProject">프로젝트 관리</button>
				</h2>

				<div id="collapseProject" class="accordion-collapse collapse show"
					data-coreui-parent="#settingsAccordion">
					<div class="accordion-body">
						<div class="card mb-3">
							<div class="card-body">
								<form id="searchForm" class="row g-2">
									<div class="col-md-3">
										<select id="projectStatusSelect" name="status"
											class="form-select">
											<option value="">전체 상태</option>
											<th:block th:each="status : ${statusList}">
												<option th:value="${status.commonNo}"
													th:text="${status.commonName}"></option>
											</th:block>
										</select>
									</div>
									<div class="col-md-6">
										<input type="text" id="keyword" name="keyword"
											class="form-control" placeholder="프로젝트명 검색">
									</div>
									<div class="col-md-3">
										<div class="d-flex gap-2">
											<button type="button" id="btnSearch"
												class="btn btn-primary w-100">
												<i class="cil-search"></i> 검색
											</button>
											<button type="button" id="btnProjectAdd"
												class="btn btn-success w-100 text-white">
												<i class="cil-plus"></i> 생성
											</button>
										</div>
									</div>
								</form>
							</div>
						</div>

						<div class="card">
							<div class="card-body p-0">
								<table
									class="table table-striped table-hover mb-0 text-center align-middle">
									<thead class="table-light">
										<tr>
											<!--<th>번호</th>-->
											<th>상태</th>
											<th>프로젝트명</th>
											<th>공개 여부</th>
											<th>등록일</th>
											<th>관리</th>
										</tr>
									</thead>
									<tbody id="projectTableBody">
										<tr th:each="p : ${projects}">
											<td th:text="${p.projectNo}"></td>
											<td class="text-start" th:text="${p.projectName}"></td>

											<td><span class="badge"
												th:classappend="${p.statusValue == 330 ? 'bg-success' : (p.statusValue == 350 ? 'bg-warning' : 'bg-info')}"
												th:text="${p.statusLabel}"></span></td>

											<td><span class="badge rounded-pill"
												th:classappend="${p.publicYn == 1 ? 'text-bg-light border' : 'text-bg-dark'}"
												th:text="${p.publicYnLabel}"></span></td>

											<td
												th:text="${p.createAt != null ? #temporals.format(p.createAt, 'yyyy/MM/dd') : '-'}"></td>

											<td>
												<button type="button" class="btn btn-sm btn-lock"
													th:classappend="${p.statusValue == 350 ? 'btn-outline-success' : 'btn-outline-warning'}"
													th:data-id="${p.projectNo}"
													th:data-status="${p.statusValue}">
													<i
														th:class="${p.statusValue == 350 ? 'cil-lock-locked' : 'cil-lock-unlocked'}"></i>
													<span th:text="${p.statusValue == 350 ? '잠금해제' : '잠금'}"></span>
												</button>

												<button class="btn btn-sm btn-outline-danger btn-delete"
													th:data-id="${p.projectNo}">삭제</button>
											</td>
										</tr>
										<tr th:if="${#lists.isEmpty(projects)}">
											<td colspan="6" class="py-4">등록된 프로젝트가 없습니다.</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- 사용자 아코디언 -->
			<div class="accordion-item">
				<h2 class="accordion-header">
					<button class="accordion-button collapsed" type="button"
						data-coreui-toggle="collapse" data-coreui-target="#collapseUser">
						사용자 관리</button>
				</h2>

				<div id="collapseUser" class="accordion-collapse collapse"
					data-coreui-parent="#settingsAccordion">
					<div class="accordion-body">
						<div class="card mb-3">
							<div class="card-body">
								<form id="userSearchForm" class="row g-2">
									<div class="col-md-3">
										<select id="userStatusSelect" name="status"
											class="form-select">
											<option value="">전체 상태</option>
										</select>
									</div>
									<div class="col-md-6">
										<input type="text" id="userKeyword" name="keyword"
											class="form-control" placeholder="이름 검색">
									</div>
									<div class="col-md-3">
										<div class="d-flex gap-2">
											<button type="button" id="btnUserSearch"
												class="btn btn-primary w-100">
												<i class="cil-search"></i> 검색
											</button>
											<button type="button" id="btnUserAdd"
												class="btn btn-success w-100 text-white">
												<i class="cil-plus"></i> 등록
											</button>
										</div>
									</div>
								</form>
							</div>
						</div>

						<div class="card">
							<div class="card-body p-0">
								<table
									class="table table-striped table-hover mb-0 text-center align-middle">
									<thead class="table-light">
										<tr>
											<th>아이디</th>
											<th>이름</th>
											<th>상태</th>
											<th>권한</th>
											<th>이메일</th>
											<th>가입일</th>
											<th>관리</th>
										</tr>
									</thead>
									<tbody id="userTableBody">
										<tr th:each="u : ${users}">
											<td th:text="${u.userId}"></td>
											<td class="text-start" th:text="${u.userName}"></td>

											<td><span class="badge"
												th:classappend="${u.status == 110 ? 'bg-success' : (u.status == 120 ? 'bg-info' : (u.status == 130 ? 'bg-warning' : 'bg-secondary'))}"
												th:text="${u.status == 110 ? '사용중' : (u.status == 120 ? '등록대기' : (u.status == 130 ? '잠금' : '퇴사'))}">
											</span></td>

											<td><span class="badge"
												th:classappend="${u.admin == 1 ? 'bg-danger' : 'bg-info'}"
												th:text="${u.admin == 1 ? '관리자' : '일반'}"></span></td>
											<td th:text="${u.email}"></td>
											<td
												th:text="${#temporals.format(u.createTime, 'yyyy/MM/dd')}"></td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- 그룹 아코디언 -->
			<div class="accordion-item">
				<h2 class="accordion-header">
					<button class="accordion-button collapsed" type="button"
						data-coreui-toggle="collapse" data-coreui-target="#collapseGroup">
						그룹 관리</button>
				</h2>

				<div id="collapseGroup" class="accordion-collapse collapse"
					data-coreui-parent="#settingsAccordion">

					<div class="accordion-body">

						<!-- 검색 영역 (선택사항) -->
						<div class="card mb-3">
							<div class="card-body">
								<form id="groupSearchForm" class="row g-2">
									<div class="col-md-9">
										<input type="text" id="groupKeyword" class="form-control"
											placeholder="그룹명 검색">
									</div>
									<div class="col-md-3">
										<div class="d-flex gap-2">
											<button type="button" id="btnGroupSearch"
												class="btn btn-primary w-100">검색</button>
											<button type="button" id="btnGroupAdd"
												class="btn btn-success w-100 text-white">
												<i class="cil-plus"></i> 생성
											</button>
										</div>
									</div>
								</form>
							</div>
						</div>

						<!-- 그룹 테이블 -->
						<div class="card">
							<div class="card-body p-0">
								<table
									class="table table-striped table-hover mb-0 text-center align-middle">
									<thead class="table-light">
										<tr>
											<!-- <th>번호</th> -->
											<th>상태</th>
											<th>그룹명</th>
											<th class="text-center">인원 수</th>

											<th>관리</th>
										</tr>
									</thead>
									<tbody id="groupTableBody">
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- 역할 아코디언 -->
			<div class="accordion-item">
				<h2 class="accordion-header">
					<button class="accordion-button collapsed" type="button"
						data-coreui-toggle="collapse" data-coreui-target="#collapseRoles">
						그룹 권한 관리</button>
				</h2>
				<div id="collapseRoles" class="accordion-collapse collapse"
					data-coreui-parent="#settingsAccordion">
					<div class="accordion-body">
						<div class="card mb-3">
							<div class="card-body">
								<div class="row g-2">
									<div class="col-md-9">
										<input type="text" id="roleKeyword" class="form-control"
											placeholder="역할명 검색">
									</div>
									<div class="col-md-3">
										<div class="d-flex gap-2">
											<button type="button" id="btnRoleSearch"
												class="btn btn-primary w-100">검색</button>
											<button type="button" id="btnRoleAdd"
												class="btn btn-success w-100 text-white">
												<i class="cil-plus"></i> 추가
											</button>
										</div>
									</div>
								</div>
							</div>
						</div>
						<div class="card">
							<div class="card-body p-0">
								<table
									class="table table-striped table-hover mb-0 text-center align-middle">
									<thead class="table-light">
										<tr>
											<th>역할명</th>
											<th>관리</th>
										</tr>
									</thead>
									<tbody id="roleTableBody">
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- 일감 상태 아코디언 -->
			<div class="accordion-item">
				<h2 class="accordion-header">
					<button class="accordion-button collapsed" type="button"
						data-coreui-toggle="collapse"
						data-coreui-target="#collapseJobStatus">일감 상태 관리</button>
				</h2>
				<div id="collapseJobStatus" class="accordion-collapse collapse"
					data-coreui-parent="#settingsAccordion">
					<div class="accordion-body">
						<div class="card mb-3">
							<div class="card-body">
								<div class="row g-2">
									<div class="col-md-9">
										<input type="text" id="jobStatusKeyword" class="form-control"
											placeholder="상태명 검색">
									</div>
									<div class="col-md-3">
										<div class="d-flex gap-2">
											<button type="button" id="btnJobStatusSearch"
												class="btn btn-primary w-100">검색</button>
											<button type="button" id="btnJobStatusAdd"
												class="btn btn-success w-100 text-white">
												<i class="cil-plus"></i> 추가
											</button>
										</div>
									</div>
								</div>
							</div>
						</div>
						<div class="card">
							<div class="card-body p-0">
								<table
									class="table table-striped table-hover mb-0 text-center align-middle">
									<thead class="table-light">
										<tr>
											<th>일감 상태명</th>
											<th>관리</th>
										</tr>
									</thead>
									<tbody id="jobStatusTableBody"></tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- 일감 유형 아코디언 -->
			<div class="accordion-item">
				<h2 class="accordion-header">
					<button class="accordion-button collapsed" type="button"
						data-coreui-toggle="collapse"
						data-coreui-target="#collapseJobType">일감 유형 관리</button>
				</h2>
				<div id="collapseJobType" class="accordion-collapse collapse"
					data-coreui-parent="#settingsAccordion">
					<div class="accordion-body">
						<div class="card mb-3">
							<div class="card-body">
								<div class="row g-2">
									<div class="col-md-9">
										<input type="text" id="jobTypeKeyword" class="form-control"
											placeholder="유형명 검색">
									</div>
									<div class="col-md-3">
										<div class="d-flex gap-2">
											<button type="button" id="btnJobTypeSearch"
												class="btn btn-primary w-100">검색</button>
											<button type="button" id="btnJobTypeAdd"
												class="btn btn-success w-100 text-white">
												<i class="cil-plus"></i> 추가
											</button>
										</div>
									</div>
								</div>
							</div>
						</div>
						<div class="card">
							<div class="card-body p-0">
								<table
									class="table table-striped table-hover mb-0 text-center align-middle">
									<thead class="table-light">
										<tr>
											<th>일감 유형명</th>
											<th>관리</th>
										</tr>
									</thead>
									<tbody id="jobTypeTableBody"></tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="confirmModal" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content border-0 shadow">
					<div class="modal-header bg-danger text-white">
						<h5 class="modal-title">
							<i class="cil-warning me-2"></i>작업 확인
						</h5>
						<button type="button" class="btn-close btn-close-white"
							data-coreui-dismiss="modal"></button>
					</div>
					<div class="modal-body p-4 text-center">
						<p id="confirmModalMessage" class="fs-5 mb-0"></p>
					</div>
					<div class="modal-footer bg-light border-0">
						<button type="button" class="btn btn-secondary"
							data-coreui-dismiss="modal">취소</button>
						<button type="button" class="btn btn-danger px-4"
							id="btnConfirmExecute">확인</button>
					</div>
				</div>
			</div>
		</div>

		<div class="toast-container position-fixed bottom-0 end-0 p-3"
			style="z-index: 9999;">
			<div id="pmsToast" class="toast hide" role="alert"
				aria-live="assertive" aria-atomic="true">
				<div class="toast-header text-white" id="toastHeader">
					<strong class="me-auto" id="toastTitle">알림</strong>
					<button type="button" class="btn-close btn-close-white"
						data-coreui-dismiss="toast"></button>
				</div>
				<div class="toast-body" id="toastBody"></div>
			</div>
		</div>
		<script>
		$(document).ready(function () {
		    // 1. 초기화 및 전역 변수
		    const projectOriginMap = {};
		    const confirmModal = new coreui.Modal(document.getElementById('confirmModal'));
		    const pmsToastElement = document.getElementById('pmsToast');
		    let pmsToast;
		    let confirmCallback = null;

		    // --- [공통 유틸 함수] ---
		    function showToast(message, type = 'success') {
		        const header = $('#toastHeader');
		        const title = $('#toastTitle');
		        const body = $('#toastBody');

		        header.removeClass('bg-success bg-danger').addClass(type === 'success' ? 'bg-success' : 'bg-danger');
		        title.text(type === 'success' ? '성공' : '알림');
		        body.text(message);

		        if (!pmsToast) pmsToast = new coreui.Toast(pmsToastElement);
		        pmsToast.show();
		    }

		    function askConfirm(message, callback) {
		        $('#confirmModalMessage').text(message);
		        confirmCallback = callback;
		        confirmModal.show();
		    }

		    $('#btnConfirmExecute').on('click', function() {
		        if (confirmCallback) { confirmCallback(); confirmCallback = null; }
		        confirmModal.hide();
		    });

		    const init = () => {
		        performSearch();
		        loadUserStatusOptions();
		        performUserSearch();
		        loadGroups();
		        loadRoles();
		        loadJobStatus();
		        loadJobTypes();
		    };

		    const apiCall = (url, type, data, success, error) => $.ajax({
		        url,
		        type,
		        data: typeof data === 'object' && type !== 'GET' ? JSON.stringify(data) : data,
		        contentType: type !== 'GET' ? 'application/json' : undefined,
		        success,
		        error: error || (() => showToast("서버 통신 중 오류가 발생했습니다.", "error"))
		    });

		    // --- [검색 로직] ---
		    const handleSearch = (inputSelector, searchFn) => {
		        let timer;
		        $(inputSelector).on('input', function () {
		            clearTimeout(timer);
		            timer = setTimeout(() => { searchFn(); }, 300);
		        });
		        $(inputSelector).on('keydown', e => {
		            if (e.key === 'Enter') { e.preventDefault(); clearTimeout(timer); searchFn(); }
		        });
		    };

		    const performSearch = () => $.get('/settings/api/projects/search', {
		        status: $('#projectStatusSelect').val(),
		        keyword: $('#keyword').val()
		    }, renderProjectTable);

		    const performUserSearch = () => $.get('/settings/api/users/search', {
		        status: $('#userStatusSelect').val(),
		        keyword: $('#userKeyword').val()
		    }, renderUserTable);

		    $('#btnSearch').on('click', performSearch);
		    $('#btnUserSearch').on('click', performUserSearch);
		    handleSearch('#keyword', performSearch);
		    handleSearch('#userKeyword', performUserSearch);
		    $('#projectStatusSelect').on('change', performSearch);
		    $('#userStatusSelect').on('change', performUserSearch);

		    // --- [테이블 렌더링] ---
		    function renderProjectTable(projects) {
		        const $tbody = $('#projectTableBody').empty();
		        if (!projects?.length) return $tbody.append('<tr><td colspan="6" class="py-4">검색 결과가 없습니다.</td></tr>');

		        projects.forEach(p => {
		            const isLocked = (p.statusValue == 350);
		            const date = p.createAt ? new Date(p.createAt).toLocaleDateString('ko-KR').replace(/\. /g, '/').replace('.', '') : "-";
		            if (!isLocked) projectOriginMap[p.projectNo] = p.statusValue;
		            const originStatus = isLocked ? (projectOriginMap[p.projectNo] || 330) : p.statusValue;

		            $tbody.append(`
		                <tr>
		                    <td><span class="badge ${p.statusValue == 330 ? 'bg-success' : isLocked ? 'bg-warning' : 'bg-info'}">${p.statusLabel}</span></td>
		                    <td class="text-start project-name-cell" data-id="${p.projectNo}" style="cursor:pointer">
		                        <span class="name-text text-primary fw-bold">${p.projectName}</span>
		                    </td>
		                    <td><span class="badge rounded-pill ${p.publicYn === 1 ? 'text-bg-light border' : 'text-bg-dark'}">${p.publicYnLabel}</span></td>
		                    <td>${date}</td>
		                    <td>
		                        <button class="btn btn-sm btn-lock ${isLocked ? 'btn-outline-success' : 'btn-outline-warning'}" 
		                                data-id="${p.projectNo}" data-status="${p.statusValue}" data-origin="${originStatus}"> 
		                            <i class="${isLocked ? 'cil-lock-locked' : 'cil-lock-unlocked'}"></i> ${isLocked ? '잠금해제' : '잠금'}
		                        </button> 
		                        <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${p.projectNo}">삭제</button>
		                    </td>
		                </tr>`);
		        });
		    }

		    function renderUserTable(users) {
		        const $tbody = $('#userTableBody').empty();
		        if (!users?.length) return $tbody.append('<tr><td colspan="7" class="py-4">검색 결과가 없습니다.</td></tr>');

		        users.forEach(u => {
		            const st = { 110: ['사용중', 'bg-success'], 120: ['등록대기', 'bg-info'], 130: ['잠금', 'bg-warning'], 190: ['퇴사', 'bg-secondary'] }[u.status] || ['알수없음', 'bg-dark'];
		            const actionBtn = u.status === 120 
		                ? `<button class="btn btn-sm btn-outline-primary btn-user-activate" data-id="${u.userId}">활성화</button>` 
		                : `<button class="btn btn-sm ${u.status === 130 ? 'btn-outline-success' : 'btn-outline-warning'} btn-user-status" 
		                           data-id="${u.userId}" data-status="${u.status === 130 ? 110 : 130}" ${u.status === 190 ? 'disabled' : ''}>${u.status === 130 ? '잠금해제' : '잠금'}</button>`;

		            $tbody.append(`
		                <tr>
		                    <td>${u.userId}</td>
		                    <td class="text-start">${u.userName}</td>
		                    <td><span class="badge ${st[1]}">${st[0]}</span></td>
		                    <td><span class="badge ${u.admin === 1 ? 'bg-danger' : 'bg-info'}">${u.admin === 1 ? '관리자' : '일반'}</span></td>
		                    <td>${u.email || '-'}</td>
		                    <td>${u.createTime ? u.createTime.split('T')[0] : "-"}</td>
		                    <td>
		                        ${actionBtn} 
		                        <button class="btn btn-sm ${u.status === 190 ? 'btn-secondary' : 'btn-outline-danger'} btn-user-retire" 
		                                data-id="${u.userId}" ${u.status === 190 ? 'disabled' : ''}>${u.status === 190 ? '퇴사완료' : '퇴사'}</button>
		                    </td>
		                </tr>`);
		        });
		    }

		    const loadUserStatusOptions = () => $.get('/settings/api/common/user-status-count', list => {
		        const $select = $('#userStatusSelect'), cur = $select.val();
		        $select.empty().append('<option value="">전체 상태</option>');
		        list.forEach(s => $select.append(`<option value="${s.commonNo}" ${cur == s.commonNo ? 'selected' : ''}>${s.commonName} (${s.userCount})</option>`));
		    });

		    // --- [공통 섹션 핸들러] ---
		    const setupSection = (config) => {
		        const renderTable = (data) => {
		            const $tbody = $(config.tbodyId).empty();
		            if (!data || data.length === 0) return $tbody.append(`<tr><td colspan="${config.cols}" class="py-4 text-center">${config.emptyMsg}</td></tr>`);
		            data.forEach(item => $tbody.append(config.rowFn(item)));
		        };
		        const load = () => $.get(config.listUrl, renderTable);
		        const search = () => $.get(config.searchUrl, { keyword: $(config.keywordId).val() }, renderTable);

		        handleSearch(config.keywordId, search);
		        $(config.searchBtnId).on('click', search);
		        $(config.addBtnId).on('click', () => {
		            if ($(config.newInputId).length) return $(config.newInputId).focus();
		            $(config.tbodyId).prepend(config.newRowHtml); $(config.newInputId).focus();
		        });
		        return { load };
		    };

		    const gCtrl = setupSection({ listUrl: '/settings/api/groups', searchUrl: '/settings/api/groups/search', searchBtnId: '#btnGroupSearch', keywordId: '#groupKeyword', addBtnId: '#btnGroupAdd', tbodyId: '#groupTableBody', cols: 4, emptyMsg: '등록된 그룹이 없습니다.', newInputId: '#groupNewInput', rowFn: g => `<tr><td><span class="badge ${g.status == 510 ? 'bg-success' : 'bg-warning'}">${g.statusName}</span></td><td class="text-start group-name-cell" data-id="${g.groupNo}" style="cursor:pointer"><span class="name-text text-primary fw-bold">${g.groupName}</span></td><td class="text-center"><span class="badge bg-light text-dark">${g.memberCount || 0} 명</span></td><td><button class="btn btn-sm ${g.status == 510 ? 'btn-outline-warning' : 'btn-outline-success'} btn-group-toggle" data-id="${g.groupNo}" data-status="${g.status}">상태변경</button></td></tr>`, newRowHtml: `<tr class="table-info" id="rowGroupNew"><td>-</td><td colspan="2"><input type="text" id="groupNewInput" class="form-control form-control-sm" placeholder="새 그룹명 입력"></td><td><button class="btn btn-sm btn-primary btn-group-save">저장</button> <button class="btn btn-sm btn-secondary btn-group-cancel">취소</button></td></tr>` });
		    const rCtrl = setupSection({ listUrl: '/settings/api/roles', searchUrl: '/settings/api/roles/search', searchBtnId: '#btnRoleSearch', keywordId: '#roleKeyword', addBtnId: '#btnRoleAdd', tbodyId: '#roleTableBody', cols: 2, emptyMsg: '등록된 권한이 없습니다.', newInputId: '#roleNewInput', rowFn: r => `<tr><td class="text-start ps-4 role-name-cell" data-id="${r.roleNo}" style="cursor:pointer"><span class="name-text text-primary fw-bold">${r.roleName}</span></td><td><button class="btn btn-sm btn-outline-danger btn-role-delete" data-id="${r.roleNo}">삭제</button></td></tr>`, newRowHtml: `<tr class="table-info" id="rowRoleNew"><td><input type="text" id="roleNewInput" class="form-control form-control-sm" placeholder="역할명 입력"></td><td><button class="btn btn-sm btn-primary btn-role-save">저장</button> <button class="btn btn-sm btn-secondary btn-role-cancel">취소</button></td></tr>` });
		    const jsCtrl = setupSection({ listUrl: '/settings/api/job-status', searchUrl: '/settings/api/job-status/search', searchBtnId: '#btnJobStatusSearch', keywordId: '#jobStatusKeyword', addBtnId: '#btnJobStatusAdd', tbodyId: '#jobStatusTableBody', cols: 2, emptyMsg: '데이터가 없습니다.', newInputId: '#jobStatusNewInput', rowFn: i => `<tr><td class="text-start ps-4">${i.jobStatus}</td><td><button class="btn btn-sm btn-outline-danger btn-job-status-delete" data-id="${i.jobStatusNo}">삭제</button></td></tr>`, newRowHtml: `<tr class="table-info" id="rowJobStatusNew"><td><input type="text" id="jobStatusNewInput" class="form-control form-control-sm" placeholder="상태명 입력"></td><td><button class="btn btn-sm btn-primary btn-job-status-save">저장</button> <button class="btn btn-sm btn-secondary btn-job-status-cancel">취소</button></td></tr>` });
		    const jtCtrl = setupSection({ listUrl: '/settings/api/job-types', searchUrl: '/settings/api/job-types/search', searchBtnId: '#btnJobTypeSearch', keywordId: '#jobTypeKeyword', addBtnId: '#btnJobTypeAdd', tbodyId: '#jobTypeTableBody', cols: 2, emptyMsg: '데이터가 없습니다.', newInputId: '#jobTypeNewInput', rowFn: i => `<tr><td class="text-start ps-4">${i.jobType}</td><td><button class="btn btn-sm btn-outline-danger btn-job-type-delete" data-id="${i.jobTypeNo}">삭제</button></td></tr>`, newRowHtml: `<tr class="table-info" id="rowJobTypeNew"><td><input type="text" id="jobTypeNewInput" class="form-control form-control-sm" placeholder="유형명 입력"></td><td><button class="btn btn-sm btn-primary btn-job-type-save">저장</button> <button class="btn btn-sm btn-secondary btn-job-type-cancel">취소</button></td></tr>` });

		    const loadGroups = gCtrl.load, loadRoles = rCtrl.load, loadJobStatus = jsCtrl.load, loadJobTypes = jtCtrl.load;

		    // --- [공통 액션 바인딩] ---
		    const bindActions = (prefix, url, loadFn, dataFn, rowIdPrefix) => {
		        const save = () => {
		            const $input = $(`#${prefix}NewInput`); const val = $input.val()?.trim();
		            if (!val) { $(`#row${rowIdPrefix}New`).remove(); return; }
		            apiCall(url, 'POST', dataFn(val), () => { showToast("등록되었습니다."); loadFn(); });
		        };
		        const btnClassBase = prefix.replace(/([A-Z])/g, "-$1").toLowerCase();
		        $(document).on('click', `.btn-${btnClassBase}-save`, save);
		        $(document).on('click', `.btn-${btnClassBase}-cancel`, () => $(`#row${rowIdPrefix}New`).remove());
		        $(document).on('click', `.btn-${btnClassBase}-delete`, function () {
		            const id = $(this).data('id'); const itemName = $(this).closest('tr').find('td:first').text().trim();
		            askConfirm(`[${itemName}] 항목을 삭제하시겠습니까?`, () => {
		                $.ajax({ url: `${url}/${id}`, type: 'DELETE', 
		                    success: () => { showToast("삭제되었습니다."); loadFn(); },
		                    error: (xhr) => {
		                        if (xhr.status === 409) showToast("현재 사용 중인 항목은 삭제할 수 없습니다.", "error");
		                        else showToast("삭제 실패", "error");
		                    }
		                });
		            });
		        });
		    };

		    bindActions('group', '/settings/api/groups', loadGroups, v => ({ groupName: v, status: 520 }), 'Group');
		    bindActions('role', '/settings/api/roles', loadRoles, v => ({ roleName: v }), 'Role');
		    bindActions('jobStatus', '/settings/api/job-status', loadJobStatus, v => ({ jobStatus: v }), 'JobStatus');
		    bindActions('jobType', '/settings/api/job-types', loadJobTypes, v => ({ jobType: v }), 'JobType');

		    // --- [특수 액션] ---
		    $(document).on('click', '.btn-lock', function () {
		        const id = $(this).data('id');
		        const targetStatus = ($(this).data('status') == 350) ? $(this).data('origin') : 350;
		        apiCall(`/settings/api/projects/${id}/lock?status=${targetStatus}`, 'PATCH', null, () => {
		            showToast("프로젝트 상태가 변경되었습니다."); performSearch();
		        });
		    });

		    $(document).on('click', '.btn-delete', function () {
		        const id = $(this).data('id');
		        askConfirm("프로젝트를 정말 삭제하시겠습니까? (삭제된 프로젝트는 복구되지 않습니다)", () => {
		            apiCall(`/settings/api/projects/${id}`, 'DELETE', null, () => {
		                showToast("삭제되었습니다."); performSearch();
		            });
		        });
		    });

		    $(document).on('click', '.btn-user-status, .btn-user-activate, .btn-user-retire', function () {
		        const userId = $(this).data('id');
		        let targetStatus, msg = "정보가 업데이트되었습니다.";

		        if ($(this).hasClass('btn-user-activate')) targetStatus = 110;
		        else if ($(this).hasClass('btn-user-retire')) {
		            askConfirm("정말로 퇴사 처리하시겠습니까?", () => {
		                apiCall('/settings/api/users/status', 'PATCH', { userId: userId, status: 190 }, () => {
		                    showToast("퇴사 처리가 완료되었습니다."); performUserSearch(); loadUserStatusOptions();
		                });
		            }); return;
		        } else targetStatus = $(this).data('status');

		        apiCall('/settings/api/users/status', 'PATCH', { userId: userId, status: targetStatus }, () => {
		            showToast(msg); performUserSearch(); loadUserStatusOptions();
		        });
		    });

		    $(document).on('click', '.btn-group-toggle', function () {
		        apiCall(`/settings/api/groups/${$(this).data('id')}/toggle-status`, 'PATCH', null, () => {
		            showToast("그룹 상태가 변경되었습니다."); loadGroups();
		        });
		    });

		    // --- [링크 이동 및 기타] ---
		    $(document).on('click', '.role-name-cell', function () { location.href = `/settings/roles-info?menu_id=${$(this).data('id')}`; });
		    $(document).on('click', '.group-name-cell', function () { location.href = `/settings/groups-info?group_no=${$(this).data('id')}`; });
		    $(document).on('click', '.project-name-cell', function () { location.href = `/settings/projects-info?projectNo=${$(this).data('id')}`; });
		    $('#btnUserAdd').on('click', () => { location.href = '/user/new'; });
		    $('#btnProjectAdd').on('click', () => { location.href = '/project/create'; });

		    init();
		});
</script>
	</div>
</html>
